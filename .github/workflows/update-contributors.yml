name: Update Contributors by Recent Activity

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update Contributors Section
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            const owner = 'EmuVlucht';
            
            const excludeRepos = ['.github'];
            
            console.log('Fetching repositories...');
            
            const repos = await github.paginate(github.rest.repos.listForUser, {
              username: owner,
              type: 'public',
              sort: 'pushed',
              direction: 'desc',
              per_page: 100
            });
            
            const filteredRepos = repos
              .filter(repo => !excludeRepos.includes(repo.name))
              .slice(0, 10);
            
            console.log(`Found ${filteredRepos.length} repositories`);
            
            const profileRepo = filteredRepos.find(r => r.name === owner);
            const otherRepos = filteredRepos.filter(r => r.name !== owner);
            
            let contributorsSection = `## <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Busts%20in%20Silhouette.png" alt="Contributors" width="30" /> Contributors

### ${owner} (Profile Repository)

<p align="center">
  <a href="https://github.com/${owner}/${owner}/graphs/contributors">
    <img src="https://contrib.rocks/image?repo=${owner}/${owner}" alt="Contributors ${owner}"/>
  </a>
</p>

<details>
<summary>📊 All Repositories</summary>
<br>

`;
            
            for (const repo of otherRepos) {
              const pushedAt = new Date(repo.pushed_at).toLocaleDateString('id-ID', {
                day: 'numeric',
                month: 'short',
                year: 'numeric'
              });
              
              contributorsSection += `### ${repo.name}
<sub>Update terakhir: ${pushedAt}</sub>

<details>
<summary>📊 Contributors</summary>
<br>

<p align="center">
  <a href="https://github.com/${owner}/${repo.name}/graphs/contributors">
    <img src="https://contrib.rocks/image?repo=${owner}/${repo.name}" alt="Contributors ${repo.name}"/>
  </a>
</p>

</details>

`;
            }
            
            contributorsSection += `</details>`;
            
            let readme = fs.readFileSync('README.md', 'utf8');
            
            const startMarker = '<!-- CONTRIBUTORS-LIST:START -->';
            const endMarker = '<!-- CONTRIBUTORS-LIST:END -->';
            
            const startIndex = readme.indexOf(startMarker);
            const endIndex = readme.indexOf(endMarker);
            
            if (startIndex !== -1 && endIndex !== -1) {
              readme = readme.substring(0, startIndex + startMarker.length) + 
                       '\n' + contributorsSection + '\n' + 
                       readme.substring(endIndex);
              
              fs.writeFileSync('README.md', readme);
              console.log('README.md updated successfully!');
            } else {
              console.log('Markers not found in README.md');
              console.log('Please add these markers to your README.md:');
              console.log(startMarker);
              console.log(endMarker);
            }

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          if ! git diff --quiet --cached; then
            git commit -m "Update contributors list [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
